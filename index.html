<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/devops2.png" />

    <!-- SEO -->
    <meta name="description" content="Marvin Wandati Kinyanjui - Certified DevOps Engineer specializing in Cloud Infrastructure (AWS), Kubernetes, CI/CD, Terraform, DevSecOps, and Automation. Based in Nairobi, Kenya." />
    <meta name="keywords" content="DevOps Engineer, DevSecOps, Cloud Engineer, Kubernetes, AWS, EKS, EC2, S3, Terraform, CI/CD, Jenkins, GitHub Actions, Automation, Docker, Trivy, Semgrep, SBOM, SLSA, Nairobi, Kenya, Marvin Wandati Kinyanjui" />

    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" />

    <!-- Security: prevent MIME sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Security: clickjacking protection -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Security: referrer policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Marvin Wandati | DevSecOps Engineer" />
    <meta property="og:description" content="Certified DevOps/DevSecOps Engineer specializing in cloud infrastructure, Kubernetes, supply chain security, and CI/CD automation." />
