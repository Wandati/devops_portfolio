<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/devops2.png" />

    <!-- SEO -->
    <meta name="description" content="Marvin Wandati Kinyanjui is a DevSecOps and Platform Engineer in Milan, Italy building secure cloud infrastructure, trusted software supply chains, AI-security guardrails, and observable Kubernetes platforms." />
    <meta name="keywords" content="DevSecOps Engineer, Platform Engineer, Cloud Security, Kubernetes, AWS, EKS, Terraform, CI/CD, GitHub Actions, Supply Chain Security, SBOM, AI-BOM, SLSA, Sigstore, ASPM, eBPF, LLM Security, AI Security, Zero Trust, Milan, Italy, Marvin Wandati Kinyanjui" />
    <meta name="author" content="Marvin Wandati Kinyanjui" />

    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" />

    <!-- Security: prevent MIME sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Security: clickjacking protection -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- Security: referrer policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Marvin Wandati | DevSecOps Engineer" />
    <meta property="og:description" content="Secure by default. Fast by design. DevSecOps, cloud security, trusted software supply chains, and platform engineering." />
    <meta property="og:image" content="/devops.png" />

    <meta name="theme-color" content="#020617" />
    <title>Marvin Wandati | DevSecOps & Platform Engineer</title>
  </head>
  <body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">

  </body>
</html>
